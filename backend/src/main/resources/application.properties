# Port and Context Path
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database Connection (H2 File-based Persistence)
spring.datasource.url=jdbc:h2:mem:lmsdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (available at http://localhost:8080/api/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Jackson JSON Settings
spring.jackson.serialization.indent_output=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Enterprise LMS stack switches. Local demo keeps optional infrastructure disabled
# until Kafka, Redis, Config Server, Eureka, and PostgreSQL are available.
spring.application.name=lms-course-service
spring.cloud.config.enabled=false
eureka.client.enabled=false
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.redis.url=${REDIS_URL:}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
resilience4j.circuitbreaker.instances.iamPermissionService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.iamPermissionService.sliding-window-size=10
resilience4j.retry.instances.iamPermissionService.max-attempts=3
resilience4j.retry.instances.iamPermissionService.wait-duration=500ms
management.health.redis.enabled=false
management.health.kafka.enabled=false
