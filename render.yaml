services:
  - type: web
    name: xebia-lms-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/actuator/health
    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: SPRING_PROFILES_ACTIVE
        value: demo
